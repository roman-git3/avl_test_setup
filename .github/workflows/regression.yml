name: Regression

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup environment
        run: bash setup_env.sh

      - name: Run regression
        run: uv run pytest tests/test_runner.py -v --tb=short
